name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  integration:
    name: Integration tests (CLI + backend in-memory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sorryhumans-cli
        uses: actions/checkout@v4
        with:
          path: sorryhumans-cli

      - name: Checkout sorryhumans (backend)
        uses: actions/checkout@v4
        with:
          repository: alanferris/sorryhumans
          path: sorryhumans
          ssh-key: ${{ secrets.BACKEND_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Venv 1: backend — fastapi + starlette 0.41.x (requirements.txt)
      - name: Create backend venv
        run: python -m venv sorryhumans/backend/.venv

      - name: Install backend deps
        working-directory: sorryhumans/backend
        run: .venv/bin/pip install -r requirements.txt uvicorn pytest httpx --quiet

      - name: Run backend unit tests (all test_*.py)
        working-directory: sorryhumans/backend
        env:
          SORRYHUMANS_STORE: memory
          ALLOW_FAKE_AUTH: "1"
        run: .venv/bin/pytest test_*.py -v

      # Venv 2: CLI — instala mcp[cli] → sse-starlette → starlette 1.x (sin pisar el backend)
      - name: Create CLI venv
        run: python -m venv sorryhumans-cli/.venv

      - name: Install CLI deps
        working-directory: sorryhumans-cli
        run: .venv/bin/pip install -e ".[dev]" requests pytest --quiet

      # El test arranca uvicorn con el Python DEL VENV DEL BACKEND para evitar el conflicto
      - name: Run CLI integration tests
        working-directory: sorryhumans-cli
        env:
          BACKEND_DIR: ${{ github.workspace }}/sorryhumans/backend
          BACKEND_PYTHON: ${{ github.workspace }}/sorryhumans/backend/.venv/bin/python
          SORRYHUMANS_STORE: memory
          ALLOW_FAKE_AUTH: "1"
        run: .venv/bin/pytest tests/test_cli_integration.py -v
